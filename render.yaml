services:
  - type: web
    name: Aetherank-Website
    runtime: node
    plan: free
    branch: main
    buildCommand: bash scripts/render-build.sh
    preDeployCommand: node_modules/.bin/drizzle-kit push --config lib/db/drizzle.config.ts || true
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
