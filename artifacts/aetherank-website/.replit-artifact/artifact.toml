kind = "web"
previewPath = "/"
title = "Aetherank Digital Marketing Agency"
version = "1.0.0"
id = "artifacts/aetherank-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21090

[services.development]
run = "pnpm --filter @workspace/aetherank-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aetherank-website", "run", "build" ]
publicDir = "artifacts/aetherank-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21090"
BASE_PATH = "/"
