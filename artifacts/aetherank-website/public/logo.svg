<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 120" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1f9c"/>
      <stop offset="55%" stop-color="#3b4fd8"/>
      <stop offset="100%" stop-color="#00c8d4"/>
    </linearGradient>
  </defs>

  <!-- ===== ICON MARK ===== -->

  <!-- Arrow tip (upward triangle at top) -->
  <polygon points="50,4 64,4 50,20" fill="url(#logoGrad)"/>

  <!-- Bar 1 (top, shortest) + dot -->
  <circle cx="20" cy="42" r="6.5" fill="url(#logoGrad)"/>
  <path d="M 18,37 L 46,19 L 52,28 L 24,47 Z" fill="url(#logoGrad)"/>

  <!-- Bar 2 (middle) + dot -->
  <circle cx="12" cy="68" r="6.5" fill="url(#logoGrad)"/>
  <path d="M 10,63 L 54,38 L 59,47 L 16,73 Z" fill="url(#logoGrad)"/>

  <!-- Bar 3 (bottom, longest) + dot -->
  <circle cx="6" cy="95" r="6.5" fill="url(#logoGrad)"/>
  <path d="M 4,90 L 57,58 L 62,67 L 10,101 Z" fill="url(#logoGrad)"/>

  <!-- ===== TEXT: AETHERANK ===== -->
  <!-- AETHE in slightly lighter weight, RANK in bolder -->
  <text
    x="90"
    y="86"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="52"
    font-weight="400"
    fill="#1a1f9c"
    letter-spacing="1"
  >AETHE<tspan font-weight="700">RANK</tspan></text>
</svg>
