<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /></head>
<body>

<!-- Netlify Form Discovery File -->
<!-- Netlify reads this at deploy time to register all forms -->

<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="contact" />
  <input name="bot-field" />
  <input name="name" />
  <input name="email" />
  <input name="phone" />
  <input name="company" />
  <input name="service" />
  <textarea name="message"></textarea>
</form>

<form name="free-audit" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="free-audit" />
  <input name="bot-field" />
  <input name="name" />
  <input name="email" />
  <input name="phone" />
  <input name="city" />
  <input name="website" />
  <input name="businessName" />
  <input name="industry" />
  <input name="monthlyTraffic" />
  <input name="goals" />
</form>

<form name="request-proposal" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="request-proposal" />
  <input name="bot-field" />
  <input name="name" />
  <input name="email" />
  <input name="phone" />
  <input name="company" />
  <input name="website" />
  <input name="industry" />
  <input name="services" />
  <input name="budget" />
  <input name="timeline" />
</form>

<form name="newsletter" netlify netlify-honeypot="bot-field" hidden>
  <input type="hidden" name="form-name" value="newsletter" />
  <input name="bot-field" />
  <input name="email" type="email" />
</form>

</body>
</html>
