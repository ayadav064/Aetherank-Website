<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta Tags -->
    <title>Aetherank | Digital Marketing Agency in Mumbai</title>
    <meta name="description" content="Aetherank is a results-driven digital marketing agency in Mumbai. We specialise in SEO, GEO, PPC, Social Media, Web Design & Content Marketing." />
    <meta name="keywords" content="digital marketing agency Mumbai, SEO services India, PPC advertising, social media marketing, content marketing, web design Mumbai" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#00c896" />

    <!-- Canonical -->
    <link rel="canonical" href="https://aetherank.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="msapplication-TileColor" content="#10b981" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aetherank.com/" />
    <meta property="og:site_name" content="Aetherank" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:title" content="Aetherank | Digital Marketing Agency in Mumbai" />
    <meta property="og:description" content="Aetherank is a results-driven digital marketing agency in Mumbai. We specialise in SEO, GEO, PPC, Social Media, Web Design & Content Marketing." />
    <meta property="og:image" content="https://aetherank.com/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Aetherank Digital Marketing Agency" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aetherank" />
    <meta name="twitter:title" content="Aetherank | Digital Marketing Agency in Mumbai" />
    <meta name="twitter:description" content="Aetherank is a results-driven digital marketing agency in Mumbai. We specialise in SEO, GEO, PPC, Social Media, Web Design & Content Marketing." />
    <meta name="twitter:image" content="https://aetherank.com/opengraph.jpg" />

    <!-- DNS prefetch + preconnect for external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Fonts: async load to avoid render blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <!-- Preload hero image (LCP element) -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&q=70&auto=format"
    />

    <!-- Organization + WebSite Schema (always visible to crawlers in static HTML) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://aetherank.com/#organization",
          "name": "Aetherank",
          "url": "https://aetherank.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://aetherank.com/favicon.svg"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-80109-60269",
            "email": "help@aetherank.com",
            "contactType": "customer service"
          },
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Tardeo AC Market, 239, Near Mumbai Central, Tardeo",
            "addressLocality": "Mumbai",
            "addressRegion": "Maharashtra",
            "postalCode": "400034",
            "addressCountry": "IN"
          },
          "sameAs": [
            "https://www.instagram.com/aetherank",
            "https://www.linkedin.com/company/aetherank"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://aetherank.com/#website",
          "name": "Aetherank",
          "url": "https://aetherank.com",
          "publisher": { "@id": "https://aetherank.com/#organization" }
        },
        {
          "@type": "LocalBusiness",
          "@id": "https://aetherank.com/#localbusiness",
          "name": "Aetherank Digital Marketing Agency",
          "url": "https://aetherank.com",
          "telephone": "+91-80109-60269",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Tardeo AC Market, 239, Near Mumbai Central, Tardeo",
            "addressLocality": "Mumbai",
            "addressRegion": "Maharashtra",
            "postalCode": "400034",
            "addressCountry": "IN"
          },
          "priceRange": "₹₹",
          "openingHours": "Mo-Fr 09:00-18:00"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
