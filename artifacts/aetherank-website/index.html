<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta Tags — overridden per-page by SSR injection in app.ts -->
    <title>Aetherank | Digital Marketing Agency in Mumbai</title>
    <meta name="description" content="Aetherank is a results-driven digital marketing agency in Mumbai. We specialise in SEO, GEO, PPC, Social Media, Web Design &amp; Content Marketing." />
    <meta name="keywords" content="digital marketing agency Mumbai, SEO services India, PPC advertising, social media marketing, content marketing, web design Mumbai" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#00c896" />

    <!-- Canonical — overridden per-page by SSR -->
    <link rel="canonical" href="https://aetherank.in/" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="msapplication-TileColor" content="#10b981" />

    <!-- Open Graph / Facebook — overridden per-page by SSR -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aetherank.in/" />
    <meta property="og:site_name" content="Aetherank" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:title" content="Aetherank | Digital Marketing Agency in Mumbai" />
    <meta property="og:description" content="Aetherank is a results-driven digital marketing agency in Mumbai. We specialise in SEO, GEO, PPC, Social Media, Web Design &amp; Content Marketing." />
    <meta property="og:image" content="https://aetherank.in/opengraph.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="Aetherank Digital Marketing Agency" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aetherank" />
    <meta name="twitter:title" content="Aetherank | Digital Marketing Agency in Mumbai" />
    <meta name="twitter:description" content="Aetherank is a results-driven digital marketing agency in Mumbai. We specialise in SEO, GEO, PPC, Social Media, Web Design &amp; Content Marketing." />
    <meta name="twitter:image" content="https://aetherank.in/opengraph.jpg" />

    <!-- DNS prefetch + preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://storage.googleapis.com" />

    <!-- Fonts: async load -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <!-- LCP hint: tell the browser this is the most important resource -->
    <link rel="preload" as="fetch" href="/api/settings" crossorigin="anonymous" />
    <link rel="preload" as="fetch" href="/api/blog/posts" crossorigin="anonymous" />

    <!--ssr-head-->
  </head>
  <body>
    <div id="root"><!--ssr-body--></div>
    <script type="module" src="/src/entry-client.tsx"></script>
  </body>
</html>
